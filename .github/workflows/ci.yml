name: OCC CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: occ-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'occ/frontend/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'occ/backend/**'
              - 'render.yaml'
              - '.github/workflows/ci.yml'

  frontend:
    name: Frontend checks
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: occ/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: occ/frontend/package-lock.json
      - name: Restore Next build cache
        uses: actions/cache@v4
        with:
          path: occ/frontend/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('occ/frontend/package-lock.json', 'occ/frontend/app/**/*', 'occ/frontend/components/**/*', 'occ/frontend/lib/**/*', 'occ/frontend/context/**/*', 'occ/frontend/scripts/route-smoke.mjs') }}
          restore-keys: |
            ${{ runner.os }}-next-
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  backend:
    name: Backend checks
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: occ/backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/occ?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/occ?schema=public
      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      APP_URL: http://localhost:3000
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ChangeMe123!
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: occ
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d occ"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: occ/backend/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npm run prisma:validate
      - run: npm run db:migrate
      - run: npm run db:check
      - run: npm run typecheck
      - run: npm run test
